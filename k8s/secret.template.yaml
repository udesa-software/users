apiVersion: v1
kind: Secret
metadata:
  name: users-secret
  namespace: udesamigos
type: Opaque
stringData:
  # Credenciales de la base de datos principal (acceso normal de la app)
  DB_HOST: "${DB_HOST}"
  DB_NAME: "${USERS_DB_NAME}"
  DB_USER: "${USERS_DB_USER}"
  DB_PASSWORD: "${USERS_DB_PASSWORD}"

  # Credenciales de admin de DB (para migraciones; pueden ser las mismas que DB_USER/PASSWORD)
  DB_ADMIN_USER: "${USERS_DB_ADMIN_USER}"
  DB_ADMIN_PASSWORD: "${USERS_DB_ADMIN_PASSWORD}"

  # JWT_SECRET: debe ser el MISMO valor que usa el api-gateway para verificar tokens.
  # Si no coinciden, todos los tokens firmados por users serán rechazados por el gateway.
  JWT_SECRET: "${JWT_SECRET}"

  # SMTP: credenciales del proveedor de correo (Mailtrap, SendGrid, etc.)
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_USER: "${SMTP_USER}"
  SMTP_PASS: "${SMTP_PASS}"

  # Contraseña temporal del superadmin inicial (solo se usa en el primer arranque)
  INITIAL_SUPERADMIN_TEMP_PASSWORD: "${INITIAL_SUPERADMIN_TEMP_PASSWORD}"
